services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: ingressos
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cluster
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - cluster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  node1:
    build: .
    container_name: node1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      --id 1
      --http-port 8001
      --cluster-port 9001
      --peers 2:node2:9002,3:node3:9003
      --peer-http 2:node2:8002,3:node3:8003
      --db-url postgres://admin:senha@postgres:5432/ingressos
      --redis-url redis://redis:6379/
    ports:
      - "8001:8001"
    expose:
      - "8001"
      - "9001"
    networks:
      - cluster

  node2:
    build: .
    container_name: node2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      --id 2
      --http-port 8002
      --cluster-port 9002
      --peers 1:node1:9001,3:node3:9003
      --peer-http 1:node1:8001,3:node3:8003
      --db-url postgres://admin:senha@postgres:5432/ingressos
      --redis-url redis://redis:6379/
    ports:
      - "8002:8002"
    expose:
      - "8002"
      - "9002"
    networks:
      - cluster

  node3:
    build: .
    container_name: node3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      --id 3
      --http-port 8003
      --cluster-port 9003
      --peers 1:node1:9001,2:node2:9002
      --peer-http 1:node1:8001,2:node2:8002
      --db-url postgres://admin:senha@postgres:5432/ingressos
      --redis-url redis://redis:6379/
    ports:
      - "8003:8003"
    expose:
      - "8003"
      - "9003"
    networks:
      - cluster

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - node1
      - node2
      - node3
    networks:
      - cluster

networks:
  cluster:
    driver: bridge
