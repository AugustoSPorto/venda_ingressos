events {
    worker_connections 1024;
}

http {
    # Upstream cluster — least_conn sends each request to the node with the
    # fewest active connections, distributing load across all healthy nodes.
    upstream nodes {
        least_conn;
        server node1:8001;
        server node2:8002;
        server node3:8003;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://nodes;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Follow redirects issued by non-leader nodes transparently.
            proxy_redirect     off;

            # Fault-tolerance: mark a peer as temporarily down after one
            # failed connection attempt.
            proxy_next_upstream error timeout http_503;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
        }
    }
}
